[package]
name = "interoptopus_csharp"
description = "The C# backend for Interoptopus."
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[[bench]]
name = "plugin"
harness = false
required-features = ["unstable-plugins"]

[[bench]]
name = "plugin_memory"
harness = false
required-features = ["unstable-plugins"]

[features]
dotnet = ["dep:netcorehost", "dep:tempfile"]
unstable-plugins = ["dotnet", "interoptopus/unstable-plugins"]

[dependencies]
interoptopus.workspace = true
interoptopus_backends.workspace = true
netcorehost = { workspace = true, optional = true }
tempfile = { workspace = true, optional = true }

[build-dependencies]
interoptopus_backends.workspace = true

[dev-dependencies]
interoptopus = { workspace = true, features = ["serde"] }
interoptopus_csharp = { path = ".", features = ["unstable-plugins"] }
reference_project.workspace = true
insta.workspace = true
memory-stats.workspace = true
tokio.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
