[package]
name = "interoptopus_csharp"
description = "The C# backend for Interoptopus."
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true
homepage.workspace = true

[[bench]]
name = "plugin"
harness = false
required-features = ["unstable-plugins"]

[features]
unstable-plugins = ["interoptopus/unstable-plugins", "rt-dotnet", "rt-aot"]
rt-dotnet = ["interoptopus/unstable-plugins", "dep:netcorehost", "dep:tempfile"]
rt-dotnet-download = ["netcorehost/nethost-download"]
rt-aot = ["interoptopus/unstable-plugins", "dep:libloading"]

[dependencies]
interoptopus = { workspace = true }
interoptopus_backends.workspace = true
libloading = { workspace = true, optional = true }
netcorehost = { workspace = true, features = ["nethost", "net10_0"], optional = true }
tempfile = { workspace = true, optional = true }

[build-dependencies]
interoptopus_backends.workspace = true

[dev-dependencies]
interoptopus = { workspace = true, features = ["macros", "serde"] }
interoptopus_csharp = { path = ".", features = ["unstable-plugins", "rt-dotnet-download"] }
reference_project.workspace = true
insta.workspace = true
tokio.workspace = true
memory-stats = "1.2.0"

[lints]
workspace = true

[package.metadata.docs.rs]
# Don't use all-features — `rt-dotnet-download` downloads the .NET runtime at build time
# and fails on docs.rs. Enable everything else explicitly instead.
features = ["unstable-plugins"]
rustdoc-args = ["--cfg", "docsrs"]
